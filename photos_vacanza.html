<!DOCTYPE html>
<html>
<head>
  <title>Upload photos</title>
  <style>
    body { font-family: sans-serif; margin: 30px; }
    input, button { margin-bottom: 10px; }
    #status { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Envoyer des photos</h2>

<input type="text" id="prenom" placeholder="Ton prénom"><br>
<input type="file" id="file" multiple><br>
<button onclick="upload()">Envoyer</button>

<p id="status"></p>

<!-- Librairie Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  // Crée le client Supabase
  const supabase = supabase.createClient(
    "https://TON-PROJET.supabase.co", // Remplace par ton URL Supabase
    "TA-ANON-KEY"                     // Remplace par ta clé anon
  )

  async function upload() {
    const files = document.getElementById("file").files
    const prenom = document.getElementById("prenom").value.trim()

    if (!files.length || !prenom) {
      alert("Remplis tout (prénom + fichiers)")
      return
    }

    const status = document.getElementById("status")
    status.innerText = "Upload en cours…"

    let successCount = 0

    for (let file of files) {
      const fileName = Date.now() + "_" + file.name

      // Upload dans Supabase Storage
      const { error: uploadError } = await supabase.storage
        .from("photos")
        .upload(fileName, file)

      if (uploadError) {
        console.error("Erreur upload:", uploadError)
        continue
      }

      // Sauvegarde dans la table uploads
      const { error: insertError } = await supabase.from("uploads").insert([
        { prenom: prenom, file_path: fileName }
      ])

      if (insertError) {
        console.error("Erreur insert table uploads:", insertError)
        continue
      }

      successCount++
    }

    status.innerText = `Upload terminé : ${successCount} fichier(s) réussi(s) ✅`
    document.getElementById("file").value = "" // reset input
    document.getElementById("prenom").value = "" // reset prénom
  }
</script>

</body>
</html>
