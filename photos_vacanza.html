<!DOCTYPE html>
<html>
<head>
  <title>Upload photos</title>
</head>
<body>

<h2>Envoyer des photos</h2>

<input type="text" id="prenom" placeholder="Ton prénom"><br><br>
<input type="file" id="file" multiple><br><br> <!-- MULTIPLE ajouté -->
<button onclick="upload()">Envoyer</button>

<p id="status"></p>

<!-- 1. Librairie Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- 2. Ton script JS -->
<script>
  // Crée le client Supabase
  const supabase = supabase.createClient(
    "https://TON-PROJET.supabase.co",
    "TA-ANON-KEY"
  )

  // ======= Ton code upload ici =======
  async function upload() {
    const files = document.getElementById("file").files
    const prenom = document.getElementById("prenom").value

    if (!files.length || !prenom) {
      alert("Remplis tout")
      return
    }

    const status = document.getElementById("status")
    status.innerText = "Upload en cours…"

    for (let file of files) {
      const fileName = Date.now() + "_" + file.name

      // upload dans Supabase Storage
      const { error: uploadError } = await supabase.storage
        .from("photos")
        .upload(fileName, file)

      if (uploadError) {
        console.error("Erreur upload:", uploadError)
        continue
      }

      // sauvegarde dans la table uploads
      await supabase.from("uploads").insert([
        { prenom: prenom, file_path: fileName }
      ])
    }

    status.innerText = "Toutes les photos ont été envoyées ✅"
    document.getElementById("file").value = "" // reset input
  }
  // ==================================
</script>

</body>
</html>
