<!DOCTYPE html>
<html>
<head>
  <title>Admin - Photos reçues</title>
  <style>
    body { font-family: sans-serif; margin: 30px; }
    #content div { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    img { max-width: 200px; display: block; margin-top: 5px; }
    input { margin-right: 10px; margin-bottom: 10px; }
    button { cursor: pointer; }
  </style>
</head>
<body>

<h2>Admin - Photos reçues</h2>

<!-- Login -->
<div id="login">
  <input type="email" id="email" placeholder="Email admin">
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<!-- Conteneur des photos -->
<div id="content" style="display:none;"></div>

<!-- Librairie Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  // --- CONFIGURE TON PROJET SUPABASE ICI ---
  const supabase = supabase.createClient(
    "https://TON-PROJET.supabase.co", // Remplace par ton URL Supabase
    "TA-ANON-KEY"                     // Remplace par ta clé anon
  )

  // --- LOGIN ---
  async function login() {
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    })

    if (error) {
      alert("Login échoué : " + error.message)
      console.error(error)
      return
    }

    // Masquer login et afficher les photos
    document.getElementById("login").style.display = "none"
    loadPhotos()
  }

  // --- CHARGEMENT DES PHOTOS ---
  async function loadPhotos() {
    // Récupérer les uploads
    const { data: uploads, error } = await supabase.from("uploads").select("*")
    if (error) {
      console.error("Erreur uploads :", error)
      alert("Impossible de récupérer les photos")
      return
    }

    const container = document.getElementById("content")
    container.innerHTML = ""
    container.style.display = "block"

    // Afficher chaque photo
    for (let item of uploads) {
      const { data: urlData, error: urlError } = await supabase.storage
        .from("photos")
        .createSignedUrl(item.file_path, 60) // URL valable 60 sec

      if (urlError) {
        console.error("Erreur URL :", urlError)
        continue
      }

      const div = document.createElement("div")
      div.innerHTML = `
        <p><strong>Prénom :</strong> ${item.prenom}</p>
        <img src="${urlData.signedUrl}">
      `
      container.appendChild(div)
    }
  }
</script>

</body>
</html>
